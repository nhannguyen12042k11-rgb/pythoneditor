<!DOCTYPE html><html lang="en"><head>    <meta charset="UTF-8">    <meta name="viewport" content="width=device-width, initial-scale=1.0">    <title>Professional Web IDE</title>    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt.min.js"></script>    <script src="https://cdn.jsdelivr.net/npm/skulpt@1.2.0/dist/skulpt-stdlib.js"></script>    <style>        :root {            --bg-main: #2B2B2B;            --bg-panel: #3C3F41;            --bg-active: #214283;            --bg-terminal: #000000;            --text-main: #A9B7C6;            --border-color: #1E1E1E;            --btn-hover: #4C5052;            --highlight: #61AFEF;        }        * {            box-sizing: border-box;            margin: 0;            padding: 0;        }        /* --- Animations --- */        @keyframes fadeIn {            from { opacity: 0; }            to { opacity: 1; }        }        @keyframes popIn {            0% { opacity: 0; transform: scale(0.85); }            100% { opacity: 1; transform: scale(1); }        }        body {            background-color: var(--bg-main);            color: var(--text-main);            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;            height: 100vh;            display: flex;            flex-direction: column;            overflow: hidden;            transition: background-color 0.4s ease;        }        /* Toolbar */        #toolbar {            height: 45px;            background-color: var(--bg-panel);            border-bottom: 1px solid var(--border-color);            display: flex;            align-items: center;            padding: 0 15px;            gap: 10px;            transition: background-color 0.4s ease;        }        .btn {            background: transparent;            color: var(--text-main);            border: none;            padding: 8px 12px;            border-radius: 4px;            cursor: pointer;            display: flex;            align-items: center;            gap: 6px;            font-size: 13px;            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);        }        .btn:hover {             background: var(--btn-hover);             transform: translateY(-1px);        }        .btn:active {            transform: translateY(1px);        }                .btn-run { color: #98C379; font-weight: bold; }        .btn-run:hover { background: rgba(152, 195, 121, 0.15); }        /* Main Layout */        #main-area {            display: flex;            flex: 1;            height: calc(100vh - 45px);        }        /* Sidebar */        #sidebar {            width: 250px;            background-color: var(--bg-panel);            border-right: 1px solid var(--border-color);            display: flex;            flex-direction: column;            transition: background-color 0.4s ease;        }        #sidebar-header {            padding: 10px 15px;            font-size: 12px;            font-weight: bold;            text-transform: uppercase;            letter-spacing: 1px;            border-bottom: 1px solid var(--border-color);        }        #file-list {            list-style: none;            flex: 1;            overflow-y: auto;        }        .file-item {            padding: 8px 15px 8px 30px;            cursor: pointer;            font-size: 14px;            display: flex;            align-items: center;            justify-content: space-between;            position: relative;            transition: background-color 0.2s ease, padding-left 0.2s ease;        }        .file-item::before {            content: "\f3d2";            font-family: "Font Awesome 6 Brands";            position: absolute;            left: 10px;            color: #4B8BBE;            transition: color 0.3s ease;        }        .file-item:hover {             background-color: var(--btn-hover);             padding-left: 34px;        }        .file-item.active {             background-color: var(--bg-active);             font-weight: bold;            color: #fff;        }        .file-item.active::before {            color: #FFD43B;        }        .file-actions {            display: flex;            gap: 8px;            opacity: 0;            transform: translateX(10px);            transition: all 0.2s ease;        }        .file-item:hover .file-actions {             opacity: 1;             transform: translateX(0);        }                .icon-btn {            color: var(--text-main);            background: none;            border: none;            cursor: pointer;            opacity: 0.7;            transition: all 0.2s ease;        }        .icon-btn:hover { opacity: 1; color: #fff; transform: scale(1.1); }        /* Workspace (Editor + Terminal) */        #workspace {            display: flex;            flex-direction: column;            flex: 1;            width: calc(100% - 250px);        }        #editor-container {            flex: 1;            position: relative;            min-height: 100px;            transition: background-color 0.4s ease;        }        /* Resizer */        #resizer {            height: 6px;            background-color: var(--bg-panel);            border-top: 1px solid var(--border-color);            border-bottom: 1px solid var(--border-color);            cursor: row-resize;            z-index: 10;            display: flex;            justify-content: center;            align-items: center;            transition: background-color 0.2s ease;        }                #resizer:hover, #resizer.resizing {            background-color: var(--highlight);        }        /* Terminal */        #terminal-wrapper {            height: 35%;            background-color: var(--bg-terminal);            display: flex;            flex-direction: column;            min-height: 100px;            transition: background-color 0.4s ease;        }        #terminal-header {            height: 30px;            background-color: var(--bg-panel);            display: flex;            align-items: center;            padding: 0 15px;            font-size: 12px;            gap: 10px;            border-bottom: 1px solid var(--border-color);            transition: background-color 0.4s ease;        }        #terminal-container {            flex: 1;            padding: 10px;            overflow: hidden;        }        /* Modals & Overlays */        #overlay {            position: fixed;            top: 0; left: 0; width: 100%; height: 100%;            background: rgba(0,0,0,0.6);            display: none;            justify-content: center;            align-items: center;            z-index: 1000;            animation: fadeIn 0.25s ease forwards;        }        .modal {            background: var(--bg-panel);            padding: 25px;            border-radius: 8px;            width: 400px;            max-height: 90vh;            overflow-y: auto;            box-shadow: 0 10px 30px rgba(0,0,0,0.5);            animation: popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;            border: 1px solid var(--border-color);        }        .modal h3 { margin-bottom: 20px; font-size: 18px; font-weight: 600; color: #fff; }        .modal label { font-size: 13px; margin-bottom: 5px; display: block; opacity: 0.9; }        .modal input[type="text"], .modal input[type="number"], .modal select {            width: 100%; padding: 10px; margin-bottom: 15px;            background: var(--bg-main); border: 1px solid var(--border-color);            color: #fff; border-radius: 4px; outline: none;            transition: all 0.2s ease;        }        .modal input:focus, .modal select:focus {             border-color: var(--highlight);             box-shadow: 0 0 0 2px rgba(97, 175, 239, 0.2);        }                .color-input-group {            display: flex; gap: 10px; margin-bottom: 15px; align-items: center;        }        .color-input-group input[type="color"] {            width: 45px; height: 38px; padding: 0; border: none;            border-radius: 4px; cursor: pointer; background: transparent;            transition: transform 0.2s ease;        }        .color-input-group input[type="color"]:hover {            transform: scale(1.05);        }        .color-input-group input[type="text"] {            margin-bottom: 0; flex: 1; font-family: monospace;        }        .modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }        .modal-actions button {            padding: 10px 18px; border: none; border-radius: 4px; cursor: pointer;            background: var(--btn-hover); color: #fff; font-size: 14px;            transition: all 0.2s ease;        }        .modal-actions button:hover { background: #5a5e61; transform: translateY(-2px); }        .modal-actions button.primary { background: var(--highlight); color: #000; font-weight: bold; }        .modal-actions button.primary:hover { background: #7cc0ff; box-shadow: 0 4px 12px rgba(97,175,239,0.3); }        .settings-divider {            height: 1px; background: var(--border-color); margin: 15px 0;        }        /* Toast Notifications */        #toast {            position: fixed;            bottom: 20px; right: 20px;            background: #4CAF50; color: white;            padding: 12px 20px; border-radius: 4px;            box-shadow: 0 4px 15px rgba(0,0,0,0.3);            opacity: 0; transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);            transform: translateY(20px) scale(0.9);            pointer-events: none; z-index: 2000;            font-weight: 500;        }        #toast.show {            opacity: 1;            transform: translateY(0) scale(1);        }    </style></head><body>    <div id="toolbar">        <button class="btn btn-run" onclick="runCode()">            <i class="fas fa-play"></i> Run Code        </button>        <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>        <button class="btn" onclick="openNewFileModal()">            <i class="fas fa-file-circle-plus"></i> New File        </button>        <button class="btn" onclick="openLocalFile()">            <i class="fas fa-folder-open"></i> Open File        </button>        <button class="btn" onclick="saveFile()">            <i class="fas fa-download"></i> Save to PC        </button>        <button class="btn" onclick="openSettingsModal()">            <i class="fas fa-cog"></i> Settings        </button>        <div style="width: 1px; height: 20px; background: var(--border-color); margin: 0 5px;"></div>        <button class="btn" onclick="clearEditor()">            <i class="fas fa-file-excel"></i> Clear Editor        </button>        <button class="btn" onclick="clearTerminal()">            <i class="fas fa-eraser"></i> Clear Terminal        </button>    </div>    <div id="main-area">        <div id="sidebar">            <div id="sidebar-header">Project Explorer</div>            <ul id="file-list"></ul>        </div>        <div id="workspace">            <div id="editor-container"></div>                        <div id="resizer"></div>                        <div id="terminal-wrapper">                <div id="terminal-header">                    <i class="fas fa-terminal"></i> Terminal                </div>                <div id="terminal-container"></div>            </div>        </div>    </div>    <div id="overlay">        <div class="modal" id="modal-box">            <h3 id="modal-title">Title</h3>            <div id="modal-body"></div>            <div class="modal-actions">                <button onclick="closeModal()">Cancel</button>                <button class="primary" id="modal-confirm">Confirm</button>            </div>        </div>    </div>    <div id="toast">Saved Successfully!</div>    <script src="https://cdnjs.cloudflare.com/ajax/libs/require.js/2.3.6/require.min.js"></script>    <script>        // --- STATE MANAGEMENT ---        let files = {            "main.py": "import sys\n\nname = input('Enter your name: ')\nprint('Hello', name)\nprint('Welcome to the Professional Web IDE!')\n\n# This is a sample number calculation\nx = 42\ny = 3.14\nprint(f'Result: {x * y}')"        };        let currentFileName = "main.py";        let editorInstance = null;                // Settings State (Default)        let fontSize = 14;        let editorBgColor = '#2B2B2B'; // Default PyCharm Dark Gray        let terminalBgColor = '#000000'; // Default Terminal Black                let syntaxColors = {            keyword: '#569CD6',    // Keywords like print, def, class, import            string: '#CE9178',     // Strings            number: '#B5CEA8',     // Numbers            comment: '#6A9955',    // Comments            identifier: '#9CDCFE'  // Variables/Identifiers        };        // --- LOAD SETTINGS FROM LOCALSTORAGE ---        function loadSettings() {            const savedSettings = localStorage.getItem('ide_settings');            if (savedSettings) {                try {                    const parsed = JSON.parse(savedSettings);                    if (parsed.fontSize) fontSize = parsed.fontSize;                    if (parsed.editorBgColor) editorBgColor = parsed.editorBgColor;                    if (parsed.terminalBgColor) terminalBgColor = parsed.terminalBgColor;                    if (parsed.syntaxColors) syntaxColors = { ...syntaxColors, ...parsed.syntaxColors };                } catch (e) {                    console.error("Failed to parse settings", e);                }            }        }        loadSettings();        // --- SAVE SETTINGS TO LOCALSTORAGE ---        function saveSettings() {            const settingsToSave = {                fontSize, editorBgColor, terminalBgColor, syntaxColors            };            localStorage.setItem('ide_settings', JSON.stringify(settingsToSave));        }        // --- FACTORY RESET ---        function resetEditor() {            if(confirm("Are you sure you want to reset all IDE settings? This will reload the page.")) {                localStorage.removeItem('ide_settings');                location.reload();            }        }        // --- TERMINAL SETUP (Xterm.js) ---        const term = new Terminal({            theme: { background: terminalBgColor, cursor: '#FFFFFF' },            fontFamily: "'Consolas', 'Courier New', monospace",            fontSize: fontSize,            cursorBlink: true,            allowTransparency: true        });        const fitAddon = new FitAddon.FitAddon();        term.loadAddon(fitAddon);        term.open(document.getElementById('terminal-container'));        fitAddon.fit();                window.addEventListener('resize', () => {            fitAddon.fit();            if (editorInstance) editorInstance.layout();        });        // Interactive Terminal Input State        let inputBuffer = '';        let readingInput = false;        let inputResolve = null;        term.onData(e => {            if (!readingInput) return;            switch (e) {                case '\r': // Enter                    term.write('\r\n');                    readingInput = false;                    let finalInput = inputBuffer;                    inputBuffer = '';                    if(inputResolve) inputResolve(finalInput);                    break;                case '\u007F': // Backspace                    if (inputBuffer.length > 0) {                        inputBuffer = inputBuffer.slice(0, -1);                        term.write('\b \b');                    }                    break;                default:                    if (e.length === 1 && e.charCodeAt(0) >= 32 && e.charCodeAt(0) <= 126) {                        inputBuffer += e;                        term.write(e);                    }                    break;            }        });        function readFromTerminal() {            readingInput = true;            inputBuffer = '';            return new Promise(resolve => {                inputResolve = resolve;            });        }        function clearTerminal() {            term.clear();        }        // --- ADDED CLEAR EDITOR FUNCTION ---        function clearEditor() {            if (!editorInstance) return;            if (confirm("Are you sure you want to clear the current file? This cannot be undone.")) {                editorInstance.setValue('');                files[currentFileName] = ''; // Sync with internal state                showToast("Editor Cleared!");            }        }        // --- THEME UPDATER ---        function applyEditorTheme() {            document.documentElement.style.setProperty('--bg-main', editorBgColor);            document.documentElement.style.setProperty('--bg-terminal', terminalBgColor);            term.options.theme = { ...term.options.theme, background: terminalBgColor };            if (typeof monaco !== 'undefined') {                monaco.editor.defineTheme('dynamicCustomTheme', {                    base: 'vs-dark',                    inherit: true,                    rules: [                        { token: 'keyword', foreground: syntaxColors.keyword.replace('#', '') },                        { token: 'string', foreground: syntaxColors.string.replace('#', '') },                        { token: 'number', foreground: syntaxColors.number.replace('#', '') },                        { token: 'comment', foreground: syntaxColors.comment.replace('#', '') },                        { token: 'identifier', foreground: syntaxColors.identifier.replace('#', '') },                         { token: 'type.python', foreground: syntaxColors.keyword.replace('#', '') },                        { token: 'custom-info', foreground: syntaxColors.keyword.replace('#', '') }                    ],                    colors: {                        'editor.background': editorBgColor                    }                });                monaco.editor.setTheme('dynamicCustomTheme');            }        }        // --- EDITOR SETUP (Monaco) ---        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs' }});        require(['vs/editor/editor.main'], function() {            applyEditorTheme();            editorInstance = monaco.editor.create(document.getElementById('editor-container'), {                value: files[currentFileName],                language: 'python',                theme: 'dynamicCustomTheme',                automaticLayout: true,                fontSize: fontSize,                minimap: { enabled: false },                smoothScrolling: true,                cursorSmoothCaretAnimation: "on"            });            editorInstance.onDidChangeModelContent(() => {                files[currentFileName] = editorInstance.getValue();            });            renderSidebar();        });        // --- FILE SYSTEM ---        function renderSidebar() {            const list = document.getElementById('file-list');            list.innerHTML = '';                        for (let fileName in files) {                const li = document.createElement('li');                li.className = `file-item ${fileName === currentFileName ? 'active' : ''}`;                li.onclick = () => switchFile(fileName);                                const nameSpan = document.createElement('span');                nameSpan.textContent = fileName;                li.appendChild(nameSpan);                const actions = document.createElement('div');                actions.className = 'file-actions';                                const renameBtn = document.createElement('button');                renameBtn.className = 'icon-btn';                renameBtn.innerHTML = '<i class="fas fa-edit"></i>';                renameBtn.onclick = (e) => { e.stopPropagation(); openRenameFileModal(fileName); };                                const delBtn = document.createElement('button');                delBtn.className = 'icon-btn';                delBtn.innerHTML = '<i class="fas fa-trash"></i>';                delBtn.onclick = (e) => { e.stopPropagation(); deleteFile(fileName); };                actions.appendChild(renameBtn);                if(Object.keys(files).length > 1) actions.appendChild(delBtn);                li.appendChild(actions);                list.appendChild(li);            }        }        function switchFile(fileName) {            if (fileName === currentFileName) return;            currentFileName = fileName;            editorInstance.setValue(files[fileName]);            renderSidebar();        }        function deleteFile(fileName) {            delete files[fileName];            if (currentFileName === fileName) {                currentFileName = Object.keys(files)[0];                editorInstance.setValue(files[currentFileName]);            }            renderSidebar();        }        function saveFile() {            if (!editorInstance) return;            files[currentFileName] = editorInstance.getValue();                        const blob = new Blob([files[currentFileName]], { type: 'text/plain' });            const a = document.createElement('a');            a.href = URL.createObjectURL(blob);            a.download = currentFileName;            document.body.appendChild(a);            a.click();            document.body.removeChild(a);            URL.revokeObjectURL(a.href);                        showToast("File Downloaded to PC!");        }        function openLocalFile() {            const input = document.createElement('input');            input.type = 'file';            input.accept = '.py,.txt';                        input.onchange = e => {                const file = e.target.files[0];                if (!file) return;                                const reader = new FileReader();                reader.onload = (event) => {                    const content = event.target.result;                    files[file.name] = content;                    switchFile(file.name);                    renderSidebar();                };                reader.readAsText(file);            };                        input.click();        }        function showToast(msg) {            const toast = document.getElementById('toast');            toast.textContent = msg;            toast.classList.add('show');            setTimeout(() => toast.classList.remove('show'), 2500);        }        // --- PYTHON EXECUTION (Skulpt) ---        async function runCode() {            if (!editorInstance) return;            files[currentFileName] = editorInstance.getValue();                        term.write(`\r\n\x1b[1;36m[IDE] Running ${currentFileName}...\x1b[0m\r\n`);            Sk.configure({                output: function(text) {                    term.write(text.replace(/\n/g, '\r\n'));                },                read: function(x) {                    if (Sk.builtinFiles === undefined || Sk.builtinFiles["files"][x] === undefined) {                        if (files[x]) return files[x];                        if (files[x + '.py']) return files[x + '.py'];                        throw "File not found: '" + x + "'";                    }                    return Sk.builtinFiles["files"][x];                },                inputfun: function(promptText) {                    return new Promise((resolve) => {                        term.write(promptText);                        readFromTerminal().then(resolve);                    });                }            });            try {                await Sk.misceval.asyncToPromise(() => {                    return Sk.importMainWithBody("<stdin>", false, files[currentFileName], true);                });                term.write('\r\n\x1b[1;32mProcess finished with exit code 0\x1b[0m\r\n');            } catch (err) {                term.write('\r\n\x1b[1;31m' + err.toString() + '\x1b[0m\r\n');            }        }        // --- MODAL SYSTEM ---        const overlay = document.getElementById('overlay');        const modalTitle = document.getElementById('modal-title');        const modalBody = document.getElementById('modal-body');        const modalConfirm = document.getElementById('modal-confirm');        function closeModal() {            overlay.style.animation = "fadeOut 0.2s ease forwards";            const modalBox = document.getElementById('modal-box');            modalBox.style.animation = "popOut 0.2s ease forwards";                        setTimeout(() => {                overlay.style.display = 'none';                overlay.style.animation = "fadeIn 0.25s ease forwards";                modalBox.style.animation = "popIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards";            }, 200);        }        const styleSheet = document.createElement("style");        styleSheet.innerText = `            @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }            @keyframes popOut { from { transform: scale(1); opacity: 1; } to { transform: scale(0.9); opacity: 0; } }        `;        document.head.appendChild(styleSheet);        function openNewFileModal() {            modalTitle.textContent = "Create New File";            modalBody.innerHTML = '<input type="text" id="modal-input" placeholder="filename.py" autofocus>';            modalConfirm.onclick = () => {                let name = document.getElementById('modal-input').value.trim();                if (!name) return;                if (!name.endsWith('.py')) name += '.py';                if (!files[name]) {                    files[name] = "# New file\n";                    switchFile(name);                }                closeModal();            };            overlay.style.display = 'flex';            setTimeout(() => document.getElementById('modal-input').focus(), 100);        }        function openRenameFileModal(oldName) {            modalTitle.textContent = "Rename File";            modalBody.innerHTML = `<input type="text" id="modal-input" value="${oldName}" autofocus>`;            modalConfirm.onclick = () => {                let newName = document.getElementById('modal-input').value.trim();                if (!newName || newName === oldName) return;                if (!newName.endsWith('.py')) newName += '.py';                                files[newName] = files[oldName];                delete files[oldName];                                if (currentFileName === oldName) currentFileName = newName;                renderSidebar();                closeModal();            };            overlay.style.display = 'flex';            setTimeout(() => document.getElementById('modal-input').focus(), 100);        }        function buildColorGroup(idPrefix, label, defaultValue) {            return `                <label>${label}:</label>                <div class="color-input-group">                    <input type="color" id="${idPrefix}-colorpicker" value="${defaultValue}">                    <input type="text" id="${idPrefix}-hexinput" value="${defaultValue}">                </div>            `;        }        function openSettingsModal() {            modalTitle.textContent = "Editor Settings";            modalBody.innerHTML = `                <label>Text Size (12 - 30px):</label>                <input type="number" id="modal-fontsize" value="${fontSize}" min="12" max="30">                                <div class="settings-divider"></div>                <h4>Environment Colors</h4><br>                ${buildColorGroup('bg-editor', 'Editor Background Color', editorBgColor)}                ${buildColorGroup('bg-terminal', 'Terminal Background Color', terminalBgColor)}                                <div class="settings-divider"></div>                <h4>Syntax Highlighting Colors</h4><br>                                ${buildColorGroup('syn-keyword', 'Keywords (print, def, import, ...)', syntaxColors.keyword)}                ${buildColorGroup('syn-string', 'Strings ("text")', syntaxColors.string)}                ${buildColorGroup('syn-number', 'Numbers (42, 3.14)', syntaxColors.number)}                ${buildColorGroup('syn-comment', 'Comments (# note)', syntaxColors.comment)}                ${buildColorGroup('syn-identifier', 'Identifiers/Variables', syntaxColors.identifier)}                <div class="settings-divider"></div>                <button class="btn" style="width: 100%; justify-content: center; background: #c0392b; margin-top: 10px;" onclick="resetEditor()">Factory Reset IDE</button>            `;            const syncPicker = (prefix) => {                const picker = document.getElementById(`${prefix}-colorpicker`);                const hexInput = document.getElementById(`${prefix}-hexinput`);                                picker.addEventListener('input', (e) => { hexInput.value = e.target.value.toUpperCase(); });                hexInput.addEventListener('input', (e) => {                    const val = e.target.value;                    if (/^#[0-9A-F]{6}$/i.test(val)) picker.value = val;                });            };            syncPicker('bg-editor');            syncPicker('bg-terminal');            syncPicker('syn-keyword');            syncPicker('syn-string');            syncPicker('syn-number');            syncPicker('syn-comment');            syncPicker('syn-identifier');            // --- COMPLETED CUT-OFF LOGIC ---            modalConfirm.onclick = () => {                let newSize = parseInt(document.getElementById('modal-fontsize').value);                if (newSize >= 12 && newSize <= 30) {                    fontSize = newSize;                    editorInstance.updateOptions({ fontSize: fontSize });                    term.options.fontSize = fontSize;                    fitAddon.fit();                }                const newEdBg = document.getElementById('bg-editor-hexinput').value.trim();                if (/^#[0-9A-F]{6}$/i.test(newEdBg)) editorBgColor = newEdBg;                const newTermBg = document.getElementById('bg-terminal-hexinput').value.trim();                if (/^#[0-9A-F]{6}$/i.test(newTermBg)) terminalBgColor = newTermBg;                const getCol = (id) => {                    let val = document.getElementById(`${id}-hexinput`).value.trim();                    return /^#[0-9A-F]{6}$/i.test(val) ? val : null;                };                syntaxColors.keyword = getCol('syn-keyword') || syntaxColors.keyword;                syntaxColors.string = getCol('syn-string') || syntaxColors.string;                syntaxColors.number = getCol('syn-number') || syntaxColors.number;                syntaxColors.comment = getCol('syn-comment') || syntaxColors.comment;                syntaxColors.identifier = getCol('syn-identifier') || syntaxColors.identifier;                applyEditorTheme();                saveSettings();                closeModal();                showToast("Settings Saved!");            };                        overlay.style.display = 'flex';        }        // --- ADDED RESIZER LOGIC ---        const resizer = document.getElementById('resizer');        const terminalWrapper = document.getElementById('terminal-wrapper');        let isResizing = false;        resizer.addEventListener('mousedown', (e) => {            isResizing = true;            document.body.style.cursor = 'row-resize';            resizer.classList.add('resizing');        });        document.addEventListener('mousemove', (e) => {            if (!isResizing) return;            // Calculate new height for terminal based on mouse position            const containerHeight = document.getElementById('workspace').clientHeight;            const newTerminalHeight = containerHeight - e.clientY;                        // Constrain heights so things don't disappear            if (newTerminalHeight > 50 && newTerminalHeight < containerHeight - 50) {                terminalWrapper.style.height = `${newTerminalHeight}px`;                if(editorInstance) editorInstance.layout();                fitAddon.fit();            }        });        document.addEventListener('mouseup', () => {            if (isResizing) {                isResizing = false;                document.body.style.cursor = 'default';                resizer.classList.remove('resizing');            }        });    </script></body></html>
